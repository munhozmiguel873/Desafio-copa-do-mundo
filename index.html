<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa do Mundo 2026 - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>🏆 Copa do Mundo 2026</h1>
    <nav class="nav-tabs">
      <button id="tab-teams" class="tab-btn active">🏃‍♂️ Seleções</button>
      <button id="tab-stadiums" class="tab-btn">🏟️ Estádios</button>
    </nav>
  </header>

  <main>
    <section class="filters-section" id="filters-section" style="display: none;">
      <input type="text" id="search-input" placeholder="Buscar por nome..." autocomplete="off">

      <div id="group-buttons-container" class="group-buttons">
        </div>
    </section>

    <div id="feedback-message" class="feedback">Carregando dados da Copa...</div>

    <div id="main-container" class="grid-container"></div>
  </main>

  <script src="app.js"></script>
</body>

</html>
